version: '3.9'

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus/rules:/etc/prometheus/rules
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    ports:
      - "${PROMETHEUS_PORT}:9090"
    networks:
      - monitoring-network
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:latest
    container_name: monitoring-alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - ./alertmanager/template.tmpl:/etc/alertmanager/template.tmpl
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "${ALERTMANAGER_PORT}:9093"
    networks:
      - monitoring-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: monitoring-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "${GRAFANA_PORT}:3000"
    networks:
      - monitoring-network
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:latest
    container_name: monitoring-node-exporter
    ports:
      - "9100:9100"
    networks:
      - monitoring-network
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:master
    container_name: monitoring-postgres-exporter
    environment:
      - DATA_SOURCE_NAME=postgres://${GP_USER}:${GP_PASSWORD}@${GP_HOST}:${GP_PORT}/${GP_DATABASE}?sslmode=disable
    ports:
      - "9187:9187"
    networks:
      - monitoring-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  greenplum-exporter:
    image: qinyugui/greenplum-exporter:1.1
    container_name: monitoring-greenplum-exporter
    environment:
      - GPDB_DATA_SOURCE_URL=postgres://${GP_USER}:${GP_PASSWORD}@${GP_HOST}:${GP_PORT}/${GP_DATABASE}?sslmode=disable
    ports:
      - "9188:9297"
    networks:
      - monitoring-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  mkdocs:
    image: polinux/mkdocs:arm64v8-1.5.2
    container_name: monitoring-mkdocs
    volumes:
      - ./runbooks:/docs
    ports:
      - "8000:8000"
    networks:
      - monitoring-network
    restart: unless-stopped

networks:
  monitoring-network:
    driver: bridge