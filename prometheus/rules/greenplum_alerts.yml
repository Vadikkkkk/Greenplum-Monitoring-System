groups:
  - name: greenplum-alerts
    rules:
      - alert: ExporterDown
        expr: min(up{ }) == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Exporter is down"
          description: "Postgres exporter is not responding"

      - alert: GreenplumDown
        expr: min(pg_up{}) == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Greenplum is down"
          description: "Postgres exporter is not responding"

      - alert: HighCPUUsage
        expr: (1 - avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 85% for more than 2 minutes"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 90%"

      - alert: LowDiskSpace
        expr: node_filesystem_avail_bytes / node_filesystem_size_bytes * 100 < 15
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space"
          description: "Disk space is below 15%"

      - alert: TooManyConnections
        expr: sum(pg_stat_database_numbackends) / sum(pg_settings_max_connections) * 100 > 80
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Too many connections"
          description: "Connections usage is above 80%"

      - alert: HighRollbackRate
        expr: rate(pg_stat_database_xact_rollback[5m]) > 5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High rollback rate"
          description: "Too many transaction rollbacks"

      - alert: NoDBActivity
        expr: sum(rate(pg_stat_database_xact_commit[5m])) == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No database activity"
          description: "No commits detected in the last 5 minutes"

      - alert: LongRunningQueries
        expr: pg_stat_activity_max_tx_duration > 300
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Long running queries detected"
          description: "Queries running longer than 5 minutes"

      - alert: HighDiskIOTime
        expr: rate(node_disk_io_time_seconds_total[5m]) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High disk IO time"
          description: "Disk is under heavy load"

      - alert: TooManyIdleConnections
        expr: pg_stat_activity_count{state="idle"} > 50
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Too many idle connections"
          description: "Large number of idle connections detected"